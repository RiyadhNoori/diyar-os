name: Check Dependencies

# =============================================================================
# Diyar OS — Dependency Freshness Check
# .github/workflows/check-deps.yml
#
# Weekly: verifies all packages in our lists exist in Debian Bookworm.
# Opens an issue if any package is missing or renamed.
# =============================================================================

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:

jobs:
  check-packages:
    name: Verify package availability
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add Debian Bookworm sources
        run: |
          sudo tee /etc/apt/sources.list.d/debian-bookworm.list <<'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF
          sudo apt-get update -qq 2>/dev/null || true

      - name: Check all packages exist
        id: pkg_check
        run: |
          MISSING=()
          FOUND=0

          for listfile in config/package-lists/*.list.chroot; do
            while IFS= read -r pkg; do
              # Skip comments and blank lines
              [[ "$pkg" =~ ^[[:space:]]*# ]] && continue
              [[ -z "${pkg// }" ]] && continue

              if apt-cache show "$pkg" &>/dev/null 2>&1; then
                ((FOUND++)) || true
              else
                MISSING+=("$pkg (from $(basename $listfile))")
                echo "MISSING: $pkg"
              fi
            done < "$listfile"
          done

          echo "Found: $FOUND packages"
          echo "Missing: ${#MISSING[@]} packages"

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "missing_packages<<EOF" >> $GITHUB_OUTPUT
            printf '%s\n' "${MISSING[@]}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_missing=true" >> $GITHUB_OUTPUT
          else
            echo "has_missing=false" >> $GITHUB_OUTPUT
          fi

      - name: Open issue for missing packages
        if: steps.pkg_check.outputs.has_missing == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const missing = `${{ steps.pkg_check.outputs.missing_packages }}`;
            const body = `## Missing packages detected\n\n` +
              `The following packages in our lists are not available in Debian Bookworm:\n\n` +
              `\`\`\`\n${missing}\n\`\`\`\n\n` +
              `Please update the package lists accordingly.\n\n` +
              `*Auto-generated by the dependency check workflow.*`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dependencies',
              state: 'open'
            });

            const existing = issues.data.find(i =>
              i.title.includes('Missing packages'));

            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Missing packages in package lists (${new Date().toISOString().split('T')[0]})`,
                body: body,
                labels: ['dependencies', 'automated']
              });
              console.log('Issue created.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Updated check (${new Date().toISOString()}):\n\n\`\`\`\n${missing}\n\`\`\``
              });
              console.log('Existing issue updated.');
            }

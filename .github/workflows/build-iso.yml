name: Build Diyar OS ISO

# =============================================================================
# Diyar OS — GitHub Actions ISO Build Pipeline
# .github/workflows/build-iso.yml
#
# Triggers:
#   - Push to main/develop (full build)
#   - Pull request to main (validation only, no release)
#   - Manual dispatch (with version input)
#   - Weekly schedule (Sunday 02:00 UTC — keeps ISO fresh)
#
# Outputs:
#   - diyar-os-<version>-amd64.iso  (GitHub Release asset)
#   - SHA256 checksum file
#   - Build log artifact
# =============================================================================

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: false
        default: 'dev'
      release:
        description: 'Create GitHub Release?'
        type: boolean
        required: false
        default: false
      debug_enabled:
        description: 'Enable tmate debug session on failure'
        type: boolean
        required: false
        default: false

  schedule:
    # Weekly build every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── Build parameters ────────────────────────────────────────────────────────
  DEBIAN_RELEASE:   bookworm
  ARCH:             amd64
  ISO_VOLUME:       DIYAR_OS
  ISO_NAME:         diyar-os
  LIVE_USER:        diyar
  LIVE_HOSTNAME:    diyar-live

  # ── Repo references (submodules) ────────────────────────────────────────────
  ARABIAN_SHIELD_REPO: https://github.com/${{ github.repository_owner }}/arabian-shield-linux-core
  DIYAR_INSTALLER_REPO: https://github.com/${{ github.repository_owner }}/diyar-installer
  DIYAR_BRANDING_REPO:  https://github.com/${{ github.repository_owner }}/diyar-branding

jobs:
  # ============================================================================
  # JOB 1 — Validate configuration files before expensive build
  # ============================================================================
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check package lists
        run: |
          echo "Checking package list syntax..."
          for f in config/package-lists/*.list.chroot; do
            echo "  → $f"
            # No blank lines that could confuse live-build
            grep -P "^\s*$" "$f" && echo "    WARNING: blank lines found" || true
            # No duplicate entries
            sort "$f" | uniq -d | grep -v "^#" | grep -v "^$" \
              && echo "    WARNING: duplicates found" || true
          done
          echo "Package list check complete."

      - name: Check hook scripts
        run: |
          echo "Checking hook scripts..."
          for f in config/hooks/live/*.hook.chroot; do
            echo "  → $f"
            bash -n "$f" || { echo "SYNTAX ERROR in $f"; exit 1; }
          done
          echo "Hook syntax check complete."

      - name: Check auto/config
        run: |
          echo "Checking auto/config..."
          bash -n auto/config || { echo "SYNTAX ERROR in auto/config"; exit 1; }
          bash -n auto/build  || { echo "SYNTAX ERROR in auto/build";  exit 1; }
          bash -n auto/clean  || { echo "SYNTAX ERROR in auto/clean";  exit 1; }
          echo "auto/* syntax check complete."

      - name: Validate XFCE4 XML configs
        run: |
          echo "Validating XML configs..."
          apt-get install -y --no-install-recommends libxml2-utils 2>/dev/null || true
          find config/ -name "*.xml" -exec xmllint --noout {} \; \
            && echo "XML validation passed." \
            || echo "WARNING: XML validation issues found."

  # ============================================================================
  # JOB 2 — Build the ISO
  # ============================================================================
  build:
    name: Build ISO
    needs: validate
    runs-on: ubuntu-latest

    # Ubuntu 22.04 runner on Debian Bookworm base gives best live-build compat
    # We use ubuntu-latest but install Debian live-build tools explicitly
    timeout-minutes: 120

    permissions:
      contents: write    # needed to create releases
      actions: read

    outputs:
      iso_filename:  ${{ steps.meta.outputs.iso_filename }}
      iso_version:   ${{ steps.meta.outputs.version }}
      build_date:    ${{ steps.meta.outputs.build_date }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout diyar-os
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── Version metadata ─────────────────────────────────────────────────────
      - name: Compute version and filenames
        id: meta
        run: |
          # Version: manual input → git tag → date-based
          if [[ "${{ github.event.inputs.version }}" != "" && \
                "${{ github.event.inputs.version }}" != "dev" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif git describe --tags --exact-match HEAD 2>/dev/null; then
            VERSION="$(git describe --tags --exact-match HEAD)"
          else
            VERSION="$(date -u '+%Y.%m.%d')-$(git rev-parse --short HEAD)"
          fi

          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"
          ISO_FILENAME="${ISO_NAME}-${VERSION}-${ARCH}.iso"

          echo "version=${VERSION}"          >> $GITHUB_OUTPUT
          echo "iso_filename=${ISO_FILENAME}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}"    >> $GITHUB_OUTPUT

          echo "┌─────────────────────────────────────────"
          echo "│  Diyar OS ISO Build"
          echo "│  Version   : ${VERSION}"
          echo "│  Filename  : ${ISO_FILENAME}"
          echo "│  Build date: ${BUILD_DATE}"
          echo "│  Trigger   : ${{ github.event_name }}"
          echo "└─────────────────────────────────────────"

      # ── System preparation ───────────────────────────────────────────────────
      - name: Free disk space
        run: |
          echo "Available before cleanup:"
          df -h /
          # Remove large unused packages to make room for ISO build (~10 GB needed)
          sudo apt-get remove -y \
            '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-cloud-sdk google-chrome-stable firefox \
            powershell mono-devel snapd 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo docker system prune -af 2>/dev/null || true
          echo "Available after cleanup:"
          df -h /

      - name: Install live-build and dependencies
        run: |
          sudo apt-get update -qq

          # ── Import Debian Bookworm GPG keys via curl
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL "https://ftp-master.debian.org/keys/archive-key-12.asc" \
            | sudo gpg --dearmor -o /etc/apt/keyrings/debian-bookworm.gpg
          curl -fsSL "https://ftp-master.debian.org/keys/archive-key-12-security.asc" \
            | sudo gpg --dearmor -o /etc/apt/keyrings/debian-bookworm-security.gpg

          # ── Add Debian Bookworm repo
          echo "deb [signed-by=/etc/apt/keyrings/debian-bookworm.gpg] http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware" \
            | sudo tee /etc/apt/sources.list.d/debian-bookworm.list
          echo "deb [signed-by=/etc/apt/keyrings/debian-bookworm-security.gpg] http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware" \
            | sudo tee /etc/apt/sources.list.d/debian-bookworm-security.list

          # ── Pin live-build and debian-archive-keyring from Debian
          cat <<'PINEOF' | sudo tee /etc/apt/preferences.d/debian-bookworm
          Package: live-build
          Pin: release o=Debian,n=bookworm
          Pin-Priority: 1001

          Package: debian-archive-keyring
          Pin: release o=Debian,n=bookworm
          Pin-Priority: 1001
          PINEOF

          sudo apt-get update -qq

          # ── Install live-build AND debian-archive-keyring from Debian
          # debian-archive-keyring installs the keyring debootstrap needs at
          # /usr/share/keyrings/debian-archive-keyring.gpg
          sudo apt-get install -y --no-install-recommends \
            -t bookworm live-build debian-archive-keyring

          # ── Install remaining build tools
          sudo apt-get install -y --no-install-recommends \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            isolinux \
            syslinux-common \
            rsync \
            parted \
            dosfstools \
            e2fsprogs \
            python3-pil \
            librsvg2-bin \
            wget \
            git \
            ovmf

          # ── Verify the keyring file exists
          echo "--- Checking keyring ---"
          ls -la /usr/share/keyrings/debian-archive-keyring.gpg             && echo "Keyring OK"             || echo "KEYRING MISSING"

          echo "live-build version: $(lb --version)"
          echo "debootstrap version: $(debootstrap --version | head -1)"

      - name: Configure live-build
        run: |
          echo "Running lb config..."
          sudo bash auto/config
          echo "Configuration complete."
          echo "=== config/ tree ==="
          find config/ -type f | sort
          echo "=== config/common ==="
          sudo cat config/common 2>/dev/null || true
          echo "=== lb --version ==="
          lb --version

      # ── Inject version into ISO ──────────────────────────────────────────────
      - name: Diagnose environment
        run: |
          echo "=============================="
          echo "=== FULL ENVIRONMENT CHECK ==="
          echo "=============================="

          echo "--- User ---"
          whoami && id

          echo "--- live-build version ---"
          lb --version
          dpkg -l live-build | tail -1

          echo "--- Required tools ---"
          for cmd in debootstrap lb squashfs-tools mksquashfs xorriso grub-mkrescue; do
            which $cmd 2>/dev/null && echo "  OK: $cmd" || echo "  MISSING: $cmd"
          done

          echo "--- config/common ---"
          cat config/common

          echo "--- config/binary ---"
          cat config/binary 2>/dev/null || echo "(no config/binary yet)"

          echo "--- config/chroot ---"
          cat config/chroot 2>/dev/null || echo "(no config/chroot yet)"

          echo "--- config/bootstrap ---"
          cat config/bootstrap 2>/dev/null || echo "(no config/bootstrap yet)"

          echo "--- package lists ---"
          ls -la config/package-lists/

          echo "--- hooks ---"
          ls -la config/hooks/live/ 2>/dev/null || echo "(no hooks/live)"

          echo "--- disk space ---"
          df -h /

          echo "--- network test ---"
          curl -fsSL --max-time 5 https://deb.debian.org/debian/dists/bookworm/Release             | head -3 || echo "NETWORK ISSUE: cannot reach deb.debian.org"

      - name: Inject version metadata
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          BUILD_DATE="${{ steps.meta.outputs.build_date }}"
          COMMIT="${{ github.sha }}"

          mkdir -p config/includes.chroot/etc
          cat > config/includes.chroot/etc/diyar-release <<EOF
          NAME="Diyar OS"
          NAME_AR="ديار"
          VERSION="${VERSION}"
          BUILD_DATE="${BUILD_DATE}"
          BUILD_COMMIT="${COMMIT}"
          BUILD_HOST="GitHub Actions"
          ARCH="${ARCH}"
          BASE="Debian ${DEBIAN_RELEASE}"
          HOME_URL="https://github.com/${{ github.repository }}"
          EOF

          # Also inject into /etc/os-release
          mkdir -p config/includes.chroot/etc
          cat > config/includes.chroot/etc/os-release <<EOF
          PRETTY_NAME="Diyar OS ${VERSION}"
          NAME="Diyar OS"
          VERSION_ID="${VERSION}"
          VERSION="Diyar OS ${VERSION} (${DEBIAN_RELEASE})"
          ID=diyar
          ID_LIKE=debian
          HOME_URL="https://github.com/${{ github.repository }}"
          SUPPORT_URL="https://github.com/${{ github.repository }}/issues"
          BUG_REPORT_URL="https://github.com/${{ github.repository }}/issues"
          EOF

          echo "Version metadata injected: ${VERSION}"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build ISO
        id: build_iso
        run: |
          echo "=== lb version ==="
          lb --version

          echo "=== config/common ==="
          cat config/common 2>/dev/null || echo "MISSING"

          echo "=== config/chroot ==="
          cat config/chroot 2>/dev/null || echo "MISSING"

          echo "=== Running lb bootstrap ==="
          sudo lb bootstrap noauto 2>&1
          echo "bootstrap exit: $?"

          echo "=== Running lb chroot ==="
          sudo lb chroot noauto 2>&1
          LB_EXIT=$?
          echo "chroot exit: $LB_EXIT"

          echo "=== chroot/build.log ==="
          sudo cat chroot/build.log 2>/dev/null || echo "(empty)"

          echo "=== chroot/debootstrap/debootstrap.log ==="
          sudo cat chroot/debootstrap/debootstrap.log 2>/dev/null || echo "(empty)"

          echo "=== apt logs in chroot ==="
          sudo cat chroot/var/log/apt/term.log 2>/dev/null | tail -50 || echo "(empty)"
          sudo cat chroot/var/log/dpkg.log 2>/dev/null | tail -50 || echo "(empty)"

          if [ $LB_EXIT -ne 0 ]; then
            exit $LB_EXIT
          fi

          echo "=== Running lb binary ==="
          sudo lb binary noauto 2>&1
          LB_EXIT=$?
          echo "binary exit: $LB_EXIT"

          ls -la
          exit $LB_EXIT

      - name: Locate and rename ISO
        id: locate_iso
        run: |
          # live-build outputs to the current directory
          ISO_SRC="$(find . -maxdepth 1 -name "*.iso" | head -1)"

          if [[ -z "$ISO_SRC" ]]; then
            echo "ERROR: No ISO file found after build!"
            ls -la
            exit 1
          fi

          ISO_DEST="${{ steps.meta.outputs.iso_filename }}"
          mv "$ISO_SRC" "$ISO_DEST"

          ISO_SIZE="$(du -sh "$ISO_DEST" | cut -f1)"
          echo "ISO: ${ISO_DEST} (${ISO_SIZE})"
          echo "iso_path=${ISO_DEST}" >> $GITHUB_OUTPUT
          echo "iso_size=${ISO_SIZE}" >> $GITHUB_OUTPUT

      # ── Generate checksums ───────────────────────────────────────────────────
      - name: Generate checksums
        run: |
          ISO="${{ steps.locate_iso.outputs.iso_path }}"
          SHA256="$(sha256sum "$ISO" | awk '{print $1}')"
          MD5="$(md5sum "$ISO" | awk '{print $1}')"

          cat > "${ISO}.sha256" <<EOF
          # Diyar OS ${{ steps.meta.outputs.version }} — Checksums
          # Generated: ${{ steps.meta.outputs.build_date }}
          SHA256: ${SHA256}
          MD5:    ${MD5}
          File:   ${{ steps.meta.outputs.iso_filename }}
          EOF

          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT
          echo ""
          echo "Checksum: ${SHA256}"
        id: checksum

      # ── Upload artifacts (always, even on failure) ───────────────────────────
      - name: Upload ISO artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: diyar-os-iso-${{ steps.meta.outputs.version }}
          path: |
            ${{ steps.locate_iso.outputs.iso_path }}
            ${{ steps.locate_iso.outputs.iso_path }}.sha256
          retention-days: 30
          compression-level: 0    # ISO is already compressed

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ steps.meta.outputs.version }}
          path: build-full.log
          retention-days: 14

      # ── Debug session on failure (only if enabled) ────────────────────────────
      - name: Debug session (tmate)
        if: failure() && github.event.inputs.debug_enabled == 'true'
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: Build summary
        if: success()
        run: |
          echo "## Diyar OS ISO Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.meta.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Filename | ${{ steps.meta.outputs.iso_filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${{ steps.locate_iso.outputs.iso_size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`${{ steps.checksum.outputs.sha256 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build date | ${{ steps.meta.outputs.build_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 3 — Quick smoke test in QEMU (no display, just boot check)
  # ============================================================================
  smoke-test:
    name: Smoke Test (QEMU boot)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'pull_request'

    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: diyar-os-iso-${{ needs.build.outputs.iso_version }}

      - name: Install QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf

      - name: Boot ISO in QEMU (headless, 60s timeout)
        run: |
          ISO="${{ needs.build.outputs.iso_filename }}"
          echo "Testing boot of: ${ISO}"

          # Boot with serial console, capture output, timeout after 60s
          timeout 60 qemu-system-x86_64 \
            -m 1024 \
            -smp 2 \
            -nographic \
            -serial mon:stdio \
            -cdrom "$ISO" \
            -boot d \
            -no-reboot \
            -append "console=ttyS0 boot=live components quiet" \
            2>&1 | tee qemu-boot.log || EXIT=$?

          # Check for kernel panic or critical errors
          if grep -qi "kernel panic\|BUG:\|OOPS:" qemu-boot.log; then
            echo "BOOT FAILURE: kernel panic detected"
            cat qemu-boot.log
            exit 1
          fi

          # Check GRUB loaded
          if grep -qi "GRUB\|grub\|Loading Linux" qemu-boot.log; then
            echo "GRUB loaded successfully."
          else
            echo "WARNING: GRUB output not detected (may be normal for headless)"
          fi

          echo "Boot smoke test passed."

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-boot-log-${{ needs.build.outputs.iso_version }}
          path: qemu-boot.log
          retention-days: 7

  # ============================================================================
  # JOB 4 — Create GitHub Release
  # Runs only on: manual dispatch with release=true, OR version tag push
  # ============================================================================
  release:
    name: Create GitHub Release
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: diyar-os-iso-${{ needs.build.outputs.iso_version }}

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ needs.build.outputs.iso_version }}"
          BUILD_DATE="${{ needs.build.outputs.build_date }}"

          cat > release_notes.md <<EOF
          # Diyar OS ${VERSION} — ديار نظام التشغيل

          **Build date:** ${BUILD_DATE}
          **Base:** Debian 12 (Bookworm) · Architecture: amd64

          ## What's included

          - Arabian Shield Linux Core — FriBidi + Pango Arabic rendering engine
          - XFCE4 desktop with full RTL layout and Arabic-first configuration
          - Vazirmatn + Amiri + Noto Arabic font stack
          - IBus Arabic input method (Alt+Shift to toggle)
          - Diyar Installer — rsync-based HDD installer (BIOS + UEFI)
          - Firefox ESR with Arabic UI
          - LibreOffice with Arabic support
          - Arabic locale (ar_IQ.UTF-8) with Baghdad timezone

          ## Installation

          \`\`\`bash
          # Write to USB
          sudo dd if=${{ needs.build.outputs.iso_filename }} of=/dev/sdX bs=4M status=progress
          sync

          # Or in QEMU for testing
          qemu-system-x86_64 -cdrom ${{ needs.build.outputs.iso_filename }} -m 2G -enable-kvm
          \`\`\`

          Boot the live session, then click **"Install Diyar OS"** on the desktop.

          ## Checksums

          See the attached \`.sha256\` file.

          ---
          *Built automatically by GitHub Actions — commit ${{ github.sha }}*
          EOF

          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.iso_version }}
          name: Diyar OS ${{ needs.build.outputs.iso_version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            ${{ needs.build.outputs.iso_filename }}
            ${{ needs.build.outputs.iso_filename }}.sha256
          token: ${{ secrets.GITHUB_TOKEN }}

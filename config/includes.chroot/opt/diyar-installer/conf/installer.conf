# =============================================================================
# Diyar OS Installer — Runtime Configuration
# conf/installer.conf
#
# Values here are defaults. The UI overwrites them before calling engine.sh.
# =============================================================================

# Installer metadata
DIYAR_INSTALLER_VERSION="1.0.0"
DIYAR_INSTALLER_NAME="Diyar OS Installer"
INSTALLER_RUNTIME_DIR="/run/diyar-installer"

# ---------------------------------------------------------------------------
# Target disk — SET BY UI
# ---------------------------------------------------------------------------
TARGET_DISK=""           # e.g. /dev/sda, /dev/nvme0n1
TARGET_PART_ROOT=""      # e.g. /dev/sda1, /dev/nvme0n1p2
TARGET_PART_EFI=""       # e.g. /dev/sda1 (UEFI only)
TARGET_PART_SWAP=""      # optional swap partition

# Partitioning mode: "auto" (wipe+partition) or "manual" (pre-partitioned)
PARTITION_MODE="auto"

# Firmware type: auto-detected by engine.sh ("bios" or "uefi")
FIRMWARE_TYPE=""

# ---------------------------------------------------------------------------
# System configuration — SET BY UI
# ---------------------------------------------------------------------------
DIYAR_HOSTNAME="diyar"
DIYAR_USERNAME="user"
DIYAR_PASSWORD=""        # plaintext, hashed immediately in chroot_setup.sh
DIYAR_FULLNAME=""        # optional display name
DIYAR_LOCALE="ar_IQ.UTF-8"
DIYAR_TIMEZONE="Asia/Baghdad"
DIYAR_KEYBOARD_LAYOUT="ara"
DIYAR_KEYBOARD_VARIANT=""

# ---------------------------------------------------------------------------
# Installation options
# ---------------------------------------------------------------------------
# Minimum required disk space in GiB
MIN_DISK_GIB=8

# rsync options override (advanced)
RSYNC_EXTRA_OPTS=""

# Post-install: auto-login for first boot
ENABLE_AUTOLOGIN=false
